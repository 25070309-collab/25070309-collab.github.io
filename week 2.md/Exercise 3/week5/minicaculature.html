<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mini Calculator</title>

    <script>
        function calculate() {
            var a = document.frmCal.txta;
            var b = document.frmCal.txtb;
            var o = document.frmCal.slto;
            var r = document.frmCal.txtr;

            var numberFormat = /^[+-]?\d+(\.\d+)?$/;

            // Kiểm tra a
            if (!numberFormat.test(a.value)) {
                alert("a must be a number!");
                a.focus();
                return;
            }

            // Kiểm tra b
            if (!numberFormat.test(b.value)) {
                alert("b must be a number!");
                b.focus();
                return;
            }

            // Kiểm tra chia cho 0
            if ((o.value == "/" || o.value == "%") && parseFloat(b.value) == 0) {
                alert("b can't be 0!");
                r.value = "";
                b.focus();
                return;
            }

            // Tính toán
            r.value = eval(a.value + o.value + b.value);
        }
    </script>
</head>

<body>
    <form name="frmCal">
        <table align="center">
            <tr>
                <td colspan="2" align="center">
                    <h2>MINI CALCULATOR</h2>
                </td>
            </tr>

            <tr>
                <td align="right">a = </td>
                <td><input name="txta"></td>
            </tr>

            <tr>
                <td align="right">b = </td>
                <td><input name="txtb"></td>
            </tr>

            <tr>
                <td align="right">Operator:</td>
                <td>
                    <select name="slto">
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="*">*</option>
                        <option value="/">/</option>
                        <option value="%">%</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td align="right">Result:</td>
                <td><input name="txtr" readonly></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="button" value="Calculate" onclick="calculate()">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
